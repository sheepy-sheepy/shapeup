name: shapeup
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  supabase_flutter: ^2.6.0
  drift: ^2.20.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  csv: ^6.0.0
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
  collection: ^1.18.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  flutter_image_compress: ^2.3.0
  permission_handler: ^11.3.1
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  remove_alpha_ios: true  

flutter:
  uses-material-design: true
  assets:
    - assets/foods.csv
    - assets/images/background.png
    - assets/images/app_logo.png
    - assets/images/photo_front.png
    - assets/images/photo_back.png
    - assets/images/photo_left.png
    - assets/images/photo_right.png